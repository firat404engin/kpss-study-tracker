services:
  - type: web
    name: kpss-study-tracker
    runtime: docker
    plan: free
    region: frankfurt
    branch: main
    rootDir: .
    dockerfilePath: ./Dockerfile
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ConnectionStrings__DefaultConnection
        fromDatabase:
          name: kpss-db
          property: connectionString
    healthCheckPath: /

databases:
  - name: kpss-db
    databaseName: kpssdb
    user: kpss_user
    region: frankfurt
    plan: free
